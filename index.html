<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VORTEX">
<title>VORTEX ハンドリング記録</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--border:#2a2a4a;--accent:#6c63ff;--accent2:#f5a623;--text:#e0e0f0;--text-sub:#8888aa;--radius:12px;--green:#4caf50;--red:#f44336}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100vh}
.app-header{background:var(--surface);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.app-title{font-size:18px;font-weight:700;color:var(--accent)}
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{flex:1;padding:12px 8px;background:none;border:none;border-bottom:3px solid transparent;color:var(--text-sub);font-size:13px;cursor:pointer;white-space:nowrap;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{display:none;padding:16px}
.tab-content.active{display:block}
.record-topbar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.topbar-field{display:flex;flex-direction:column;gap:4px}
.topbar-field label{font-size:12px;color:var(--text-sub)}
input[type=date],select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:14px}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:12px}
.player-name{font-weight:700;font-size:15px;margin-bottom:10px;color:var(--accent)}
.count-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.count-label{font-size:13px;color:var(--text-sub);min-width:60px}
.count-ctrl{display:flex;align-items:center;gap:8px}
.count-ctrl button{width:34px;height:34px;border-radius:50%;border:none;font-size:18px;cursor:pointer;font-weight:700;background:var(--surface2);color:var(--text)}
.count-ctrl button:active{background:var(--accent)}
.count-val{display:none}.count-input{font-size:20px;font-weight:700;width:68px;text-align:center;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);padding:3px 4px;-moz-appearance:textfield;}.count-input::-webkit-inner-spin-button,.count-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
.absent-toggle{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-sub);cursor:pointer}
.absent-toggle input{accent-color:var(--accent2)}
.btn-save-all{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#9c88ff);border:none;border-radius:var(--radius);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-top:8px}
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-bar select{flex:1;min-width:120px}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.entry-meta{font-size:12px;color:var(--text-sub)}
.entry-menu{font-weight:600;font-size:14px}
.entry-count{font-size:22px;font-weight:700;color:var(--accent)}
.entry-absent{font-size:13px;color:var(--accent2)}
.edit-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 6px;opacity:0.7;}
.edit-btn:hover{opacity:1;}
.del-btn{background:none;border:none;color:var(--text-sub);font-size:16px;cursor:pointer;padding:4px}
.stats-player-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.stats-player-name{font-size:17px;font-weight:700;color:var(--accent);margin-bottom:4px}
.stats-total-badge{display:inline-block;background:var(--accent);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700;margin-bottom:12px}
.stats-menu-section{margin-bottom:16px}
.stats-menu-title{font-size:13px;font-weight:700;color:var(--text-sub);margin-bottom:6px}
.chart-wrapper{position:relative;height:150px;margin-bottom:6px}
.stats-summary-row{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;margin-top:6px}
.stat-badge{background:var(--surface2);border-radius:6px;padding:4px 8px;color:var(--text-sub)}
.stat-badge span{font-weight:700;color:var(--text)}
.stat-badge.best{border-left:3px solid var(--green)}
.stat-badge.growth{border-left:3px solid var(--accent)}
.stat-badge.challenge{border-left:3px solid var(--accent2)}
.growth-arrow.up{color:var(--green);font-weight:700}
.growth-arrow.down{color:var(--red);font-weight:700}
.growth-arrow.same{color:var(--text-sub);font-weight:700}
.no-data{color:var(--text-sub);font-size:13px;padding:20px;text-align:center}
.section-title{font-size:13px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}
.tags-area{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
.tag .remove{background:none;border:none;color:var(--text-sub);cursor:pointer;font-size:14px;padding:0}
.add-row{display:flex;gap:8px;margin-bottom:8px}
.add-row input{flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 12px;font-size:14px}
.add-row button{background:var(--accent);border:none;border-radius:8px;color:#fff;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:600}
.btn-danger{background:var(--red);border:none;border-radius:8px;color:#fff;padding:10px 18px;font-size:14px;cursor:pointer;font-weight:600}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#333;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.btn-pdf{background:linear-gradient(135deg,#e74c3c,#c0392b);border:none;border-radius:8px;color:#fff;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:600}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:720px;padding:20px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--text-sub);font-size:20px;cursor:pointer}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin-right:4px}
.sync-dot.offline{background:var(--red)}
@media print{.app-header,.tab-bar,.no-print{display:none!important}.tab-content{display:block!important;padding:0}#tab-record,#tab-list,#tab-settings{display:none!important}#tab-stats{display:block!important}body{background:#fff;color:#000}.stats-player-section{break-inside:avoid;border:1px solid #ccc;background:#fff}.stats-player-name{color:#222}.stats-total-badge{background:#555;color:#fff}.stat-badge{background:#f0f0f0;color:#333}.stat-badge span{color:#000}}
</style>
</head>
<body>
<header class="app-header">
  <div class="app-title">⚡ VORTEX</div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="btn-pdf no-print" onclick="openReport()">📄 レポート</button>
    <span id="sync-label" style="font-size:12px;color:var(--text-sub)"><span class="sync-dot" id="sync-dot"></span>接続中</span>
  </div>
</header>
<nav class="tab-bar">
  <button class="tab-btn active" onclick="showTab('record')">📝 記録</button>
  <button class="tab-btn" onclick="showTab('list')">📋 一覧</button>
  <button class="tab-btn" onclick="showTab('stats')">📊 集計</button>
  <button class="tab-btn" onclick="showTab('settings')">⚙️ 設定</button>
</nav>
<div id="tab-record" class="tab-content active">
  <div class="record-topbar">
    <div class="topbar-field"><label>日付</label><input type="date" id="inp-date"></div>
    <div class="topbar-field"><label>メニュー</label><select id="inp-menu" onchange="updateUnitLabels()"></select></div>
  </div>
  <div id="player-list"></div>
  <button class="btn-save-all" onclick="saveAll()">💾 全員まとめて保存</button>
</div>
<div id="tab-list" class="tab-content">
  <div class="filter-bar">
    <select id="fl-player" onchange="renderList()"><option value="">全選手</option></select>
    <select id="fl-menu" onchange="renderList()"><option value="">全メニュー</option></select>
  </div>
  <div id="list-container"></div> 
</div>
<div id="tab-stats" class="tab-content">
  <div class="filter-bar no-print">
    <select id="st-player" onchange="renderStats()"><option value="">全選手</option></select>
    <select id="st-menu" onchange="renderStats()"><option value="">全メニュー</option></select>
  </div>
  <div id="stats-container"></div>
</div>
<div id="tab-settings" class="tab-content">
  <div class="section-title">選手</div>
  <div class="tags-area" id="player-tags"></div>
  <div class="add-row"><input type="text" id="new-player" placeholder="選手名を追加"><button onclick="addPlayer()">追加</button></div>
  <div class="section-title">メニュー</div>
  <div class="tags-area" id="menu-tags"></div>
  <div class="add-row"><input type="text" id="new-menu" placeholder="メニューを追加"><button onclick="addMenu()">追加</button></div>
  <div class="section-title">データ</div>
  <button class="btn-danger" onclick="clearAll()">🗑️ 全データ削除</button>
</div>
<div class="toast" id="toast"></div>
<div id="report-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">📊 選手別 成長レポート</span>
      <button class="modal-close" onclick="closeReport()">&#10005;</button>
    </div>
    <div class="filter-bar no-print">
      <select id="rp-player" onchange="renderReport()"><option value="">全選手</option></select>
      <select id="rp-menu" onchange="renderReport()"><option value="">全メニュー</option></select>
    </div>
    <div id="report-container"></div>
    <div style="margin-top:16px;text-align:right" class="no-print">
      <button class="btn-pdf" onclick="printReport()">🖸️ PDFに保存</button>
    </div>
  </div>
</div>
<script>
const FB='https://vortex-handling-default-rtdb.asia-southeast1.firebasedatabase.app',FP='/vortex-state',RUN='２０M走';
let state={players:['りんたろう','きっぷい','さくのすけ','ゆうせい','だん'],menus:['頭回し右','頭回し左','胴回し右','胴回し左','膈回し右','膈回し左','八の字前','八の字後','縄跳び','２０Mシャトルラン','２０M走'],entries:[],saveTimer:null,isSaving:false};
let _charts={};
function fbGet(){return fetch(FB+FP+'.json').then(r=>r.ok?r.json():null).catch(()=>null)}
function fbSet(d){return fetch(FB+FP+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(()=>{})}
function setSS(s){const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');if(!d)return;if(s==='online'){d.className='sync-dot';if(l)l.innerHTML='<span class="sync-dot" id="sync-dot"></span>接続中';}else{d.className='sync-dot offline';if(l)l.innerHTML='<span class="sync-dot offline" id="sync-dot"></span>オフライン';}}
async function save(){if(state.isSaving)return;state.isSaving=true;state.ts=Date.now();try{const{isSaving:_si,saveTimer:_st,...d}=state;await fbSet(d);setSS('online');}catch(e){setSS('offline');}state.isSaving=false;}
function debounceSave(){if(state.saveTimer)clearTimeout(state.saveTimer);state.saveTimer=setTimeout(save,800);}
function showTab(t){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');document.querySelectorAll('.tab-btn')[['record','list','stats','settings'].indexOf(t)].classList.add('active');if(t==='list')renderList();if(t==='stats')renderStats();if(t==='settings')renderTags();}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function cStr(count,menu){if(menu===RUN)return count+'秒';return count+'回';}
function updateUnitLabels(){renderPlayerList();}
function renderPlayerList(){const pl=document.getElementById('player-list');if(!pl)return;const menu=document.getElementById('inp-menu')?.value||'';const isRun=(menu===RUN);const step=isRun?'0.01':'1';const label=isRun?'タイム':'回数';const savedValues={};const savedAbsent={};document.querySelectorAll('.count-input').forEach(e=>{savedValues[e.id]=e.value;});document.querySelectorAll('.abs-chk').forEach(e=>{savedAbsent[e.id]=e.checked;});let h='';state.players.forEach((p,pi)=>{h+='<div class="player-card"><div class="player-name">'+p+'</div><div class="count-row"><span class="count-label">'+label+'</span><div class="count-ctrl"><button class="adj-btn" data-idx="'+pi+'" data-d="-1">−</button><span class="count-val" id="cv-'+pi+'">0</span><input class="count-input" id="ci-'+pi+'" type="number" min="0" step="'+step+'" value="0"><button class="adj-btn" data-idx="'+pi+'" data-d="1">＋</button></div></div><label class="absent-toggle"><input type="checkbox" id="ab-'+pi+'" class="abs-chk"> 欠席</label></div>';});pl.innerHTML=h;document.querySelectorAll('.count-input').forEach(e=>{if(savedValues[e.id]!==undefined&&savedValues[e.id]!=='0'){e.value=savedValues[e.id];}});document.querySelectorAll('.abs-chk').forEach(e=>{if(savedAbsent[e.id])e.checked=true;});pl.querySelectorAll('.adj-btn').forEach(btn=>btn.addEventListener('click',()=>adj(+btn.dataset.idx,+btn.dataset.d)));}
function adj(i,d){const inp=document.getElementById('ci-'+i);const menu=document.getElementById('inp-menu')?.value||'';if(menu===RUN){let v=parseFloat(inp.value)||0;v=Math.max(0,Math.round((v+d*0.1)*1000)/1000);inp.value=v;}else{let v=parseInt(inp.value)||0;v=Math.max(0,v+d);inp.value=v;}}
async function saveAll(){const date=document.getElementById('inp-date').value;const menu=document.getElementById('inp-menu').value;if(!date){showToast('日付を選択してください');return;}if(!menu){showToast('メニューを選択してください');return;}let saved=0;state.players.forEach((p,i)=>{const absent=document.getElementById('ab-'+i)?.checked||false;const count=parseFloat(document.getElementById('ci-'+i)?.value)||0;if(absent||count>0){state.entries.push({id:Date.now()+'-'+i,player:p,menu,date,count,absent});saved++;}});if(saved===0){showToast('記録がありません');return;}debounceSave();showToast(saved+'人分保存しました');document.querySelectorAll('.count-input').forEach(e=>e.value='0');document.querySelectorAll('.abs-chk').forEach(e=>e.checked=false);}
function renderMenuOptions(){['inp-menu','fl-menu','st-menu','rp-menu'].forEach(id=>{const el=document.getElementById(id);if(!el)return;const cur=el.value;const isFilter=(id!=='inp-menu');let h=isFilter?'<option value="">全メニュー</option>':'';state.menus.forEach(m=>{h+='<option value="'+m+'">'+m+'</option>';});el.innerHTML=h;if(state.menus.includes(cur))el.value=cur;});}
function renderPlayerOptions(){['fl-player','st-player','rp-player'].forEach(id=>{const el=document.getElementById(id);if(!el)return;const cur=el.value;let h='<option value="">全選手</option>';state.players.forEach(p=>{h+='<option value="'+p+'">'+p+'</option>';});el.innerHTML=h;if(state.players.includes(cur))el.value=cur;});}
function renderList(){const fp=document.getElementById('fl-player')?.value||'';const fm=document.getElementById('fl-menu')?.value||'';const el=document.getElementById('list-container');if(!el)return;let entries=[...state.entries].filter(e=>(fp?e.player===fp:true)&&(fm?e.menu===fm:true));entries.sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id)));let h='';if(!entries.length){h='<div class="no-data">記録がありません</div>';}else{entries.forEach(e=>{h+='<div class="entry-card"><div><div class="entry-menu">'+e.menu+'<small style="color:var(--text-sub);font-size:11px;margin-left:6px">'+e.player+'</small></div><div class="entry-meta">'+e.date+'</div></div><div style="display:flex;align-items:center;gap:8px">'+(e.absent?'<span class="entry-absent">欠席</span>':'<span class="entry-count">'+cStr(e.count,e.menu)+'</span>')+'<button class="edit-btn" data-id="'+e.id+'">✏</button><button class="del-btn" data-id="'+e.id+'">&#215;</button></div></div>';});}el.innerHTML=h;el.querySelectorAll('.edit-btn').forEach(btn=>btn.addEventListener('click',()=>editEntry(btn.dataset.id)));el.querySelectorAll('.del-btn').forEach(btn=>btn.addEventListener('click',()=>delEntry(btn.dataset.id)));}
function delEntry(id){if(!confirm('この記録を削除しますか？'))return;state.entries=state.entries.filter(e=>e.id!==id);debounceSave();renderList();showToast('削除しました');}
function editEntry(id){
  const e=state.entries.find(x=>String(x.id)===String(id));
  if(!e)return;
  const newVal=prompt(e.player+' / '+e.menu+' ('+e.date+')
現在の値: '+e.count+'
新しい値を入力してください:',e.count);
  if(newVal===null)return;
  const parsed=parseFloat(newVal);
  if(isNaN(parsed)){alert('無効な値です');return;}
  e.count=parsed;
  save();renderAll();
}

function destroyCharts(){Object.values(_charts).forEach(c=>{try{c.destroy();}catch(e){}});_charts={};}
function renderStats(){destroyCharts();const sp=document.getElementById('st-player')?.value||'';const sm=document.getElementById('st-menu')?.value||'';const el=document.getElementById('stats-container');if(!el)return;const players=sp?[sp]:state.players;const menus=sm?[sm]:state.menus;let h='';players.forEach(player=>{const pe=state.entries.filter(e=>e.player===player&&!e.absent);if(!pe.length)return;h+='<div class="stats-player-section"><div class="stats-player-name">🏃 '+player+'</div>';const ts=new Set(pe.map(e=>e.date)).size;h+='<span class="stats-total-badge">参加 '+ts+' 回</span>';menus.forEach(menu=>{const me=pe.filter(e=>e.menu===menu).sort((a,b)=>a.date.localeCompare(b.date));if(!me.length)return;const counts=me.map(e=>e.count);const maxC=Math.max(...counts);const lastC=counts[counts.length-1];const diff=lastC-counts[0];const avgC=Math.round(counts.reduce((a,b)=>a+b,0)/counts.length);const cid='c'+Math.random().toString(36).slice(2);h+='<div class="stats-menu-section"><div class="stats-menu-title">'+menu+'</div><div class="chart-wrapper"><canvas id="'+cid+'"></canvas></div>';h+='<div class="stats-summary-row"><div class="stat-badge best">🏆 最高 <span>'+cStr(maxC,menu)+'</span></div><div class="stat-badge growth">📈 成長 <span>'+(diff>=0?'+':'')+cStr(Math.abs(diff),menu)+'</span></div><div class="stat-badge challenge">🎯 今回 <span>'+cStr(lastC,menu)+'</span></div><div class="stat-badge">📅 回数 <span>'+me.length+'回</span></div></div></div>';setTimeout(()=>{const cv=document.getElementById(cid);if(!cv)return;const labels=me.map(e=>e.date.slice(5));_charts[cid]=new Chart(cv,{type:'line',data:{labels,datasets:[{data:counts,borderColor:'#6c63ff',backgroundColor:'rgba(108,99,255,0.15)',borderWidth:2.5,pointBackgroundColor:counts.map(c=>c===maxC?'#f5a623':'#6c63ff'),pointRadius:counts.map(c=>c===maxC?7:4),tension:0.35,fill:true},{data:Array(counts.length).fill(avgC),borderColor:'rgba(255,255,255,0.2)',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>cStr(ctx.raw,menu)}}},scales:{x:{ticks:{color:'#8888aa',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#8888aa',font:{size:10},callback:v=>cStr(v,menu)},grid:{color:'rgba(255,255,255,0.07)'},beginAtZero:true}}}});},50);});h+='</div>';});if(!h)h='<div class="no-data">記録がありません</div>';el.innerHTML=h;}
function renderTags(){const pt=document.getElementById('player-tags');const mt=document.getElementById('menu-tags');if(!pt||!mt)return;pt.innerHTML=state.players.map((p,i)=>'<div class="tag">'+p+'<button class="remove rp-btn" data-idx="'+i+'">&#215;</button></div>').join('');mt.innerHTML=state.menus.map((m,i)=>'<div class="tag">'+m+'<button class="remove rm-btn" data-idx="'+i+'">&#215;</button></div>').join('');pt.querySelectorAll('.rp-btn').forEach(b=>b.addEventListener('click',()=>removePlayer(+b.dataset.idx)));mt.querySelectorAll('.rm-btn').forEach(b=>b.addEventListener('click',()=>removeMenu(+b.dataset.idx)));}
function addPlayer(){const el=document.getElementById('new-player');const n=el?.value.trim();if(!n)return;if(!state.players.includes(n)){state.players.push(n);save();renderAll();}el.value='';}
function removePlayer(i){if(!confirm(state.players[i]+'を削除しますか？'))return;state.players.splice(i,1);save();renderAll();}
function addMenu(){const el=document.getElementById('new-menu');const n=el?.value.trim();if(!n)return;if(!state.menus.includes(n)){state.menus.push(n);save();renderAll();}el.value='';}
function removeMenu(i){if(!confirm(state.menus[i]+'を削除しますか？'))return;state.menus.splice(i,1);save();renderAll();}
function clearAll(){if(!confirm('全データを削除しますか？'))return;state.entries=[];save();renderAll();showToast('削除しました');}
function renderAll(){renderMenuOptions();renderPlayerOptions();renderPlayerList();}
function openReport(){document.getElementById('report-modal').classList.add('open');renderReport();}
function closeReport(){document.getElementById('report-modal').classList.remove('open');}
function renderReport(){const sp=document.getElementById('rp-player')?.value||'';const sm=document.getElementById('rp-menu')?.value||'';const el=document.getElementById('report-container');if(!el)return;const players=sp?[sp]:state.players;const menus=sm?[sm]:state.menus;let h='';players.forEach(player=>{const pe=state.entries.filter(e=>e.player===player&&!e.absent);if(!pe.length)return;h+='<div class="stats-player-section"><div class="stats-player-name">🏃 '+player+'</div>';menus.forEach(menu=>{const me=pe.filter(e=>e.menu===menu).sort((a,b)=>a.date.localeCompare(b.date));if(!me.length)return;const counts=me.map(e=>e.count);const maxC=Math.max(...counts);const lastC=counts[counts.length-1];const diff=lastC-counts[0];const avgC=Math.round(counts.reduce((a,b)=>a+b,0)/counts.length);const ac=diff>0?'up':diff<0?'down':'same';const ar=diff>0?'▲':diff<0?'▼':'―';h+='<div class="stats-menu-section"><div class="stats-menu-title">'+menu+'</div><div class="stats-summary-row"><div class="stat-badge best">🏆 最高 <span>'+cStr(maxC,menu)+'</span></div><div class="stat-badge challenge">🎯 最新 <span>'+cStr(lastC,menu)+'</span></div><div class="stat-badge growth">📈 初回比 <span class="growth-arrow '+ac+'">'+ar+(diff>=0?'+':'')+cStr(Math.abs(diff),menu)+'</span></div><div class="stat-badge">📊 平均 <span>'+cStr(avgC,menu)+'</span></div><div class="stat-badge">📅 参加 <span>'+me.length+'回</span></div></div>';h+='<div style="overflow-x:auto;margin-top:8px"><table style="font-size:11px;width:100%;border-collapse:collapse"><thead><tr>';me.forEach(e=>{h+='<th style="padding:3px 5px;font-weight:normal;min-width:40px;color:#888">'+e.date.slice(5)+'</th>';});h+='</tr></thead><tbody><tr>';me.forEach((e,idx)=>{const prev=idx>0?me[idx-1].count:null;const d=prev!==null?e.count-prev:null;const bg=d===null?'':(d>0?'rgba(76,175,80,0.2)':d<0?'rgba(244,67,54,0.2)':'');h+='<td style="padding:3px 5px;text-align:center;font-weight:700;background:'+bg+'">'+cStr(e.count,menu)+(d!==null?'<br><small style="color:'+(d>0?'#4caf50':d<0?'#f44336':'#888')+'">'+((d>0?'+':'')+d)+'</small>':'')+'</td>';});h+='</tr></tbody></table></div></div>';});h+='</div>';});if(!h)h='<div class="no-data">記録がありません</div>';el.innerHTML=h;}
function printReport(){window.print();}
async function init(){const d=await fbGet();if(d&&Array.isArray(d.players)){const{isSaving:_si,saveTimer:_st,..._clean}=d;state={...state,..._clean};}renderAll();setInterval(async()=>{const d=await fbGet();if(d&&d.ts&&d.ts!==state.ts){const{isSaving:_si,saveTimer:_st,..._clean}=d;state={...state,..._clean};renderAll();}},10000);document.getElementById('inp-date').value=new Date().toISOString().slice(0,10);}
init();
</script>
</body>
