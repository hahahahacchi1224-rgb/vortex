<style>:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--border:#2a2a4a;--accent:#6c63ff;--accent2:#f5a623;--text:#e0e0f0;--text-sub:#8888aa;--radius:12px;--green:#4caf50;--red:#f44336}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh}.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.app-title{font-size:18px;font-weight:800;background:linear-gradient(90deg,#6c63ff,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sync-indicator{font-size:11px;color:var(--text-sub);display:flex;align-items:center;gap:4px}.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}.sync-dot.offline{background:var(--red);animation:none}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}.tab-btn{flex:1;padding:10px 4px;font-size:12px;font-weight:600;color:var(--text-sub);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;min-width:60px}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}.tab-content{display:none;padding:16px;max-width:600px;margin:0 auto}.tab-content.active{display:block}.record-topbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.topbar-field{flex:1;min-width:120px}.topbar-field label{font-size:11px;color:var(--text-sub);display:block;margin-bottom:4px}.topbar-field select,.topbar-field input[type=date]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:14px}.player-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}.player-name{font-weight:700;font-size:14px;flex:1}.count-input{width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:16px;text-align:center}.unit-label{font-size:12px;color:var(--text-sub);font-weight:600;min-width:14px}.btn-save{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}.btn-save-all{width:100%;background:linear-gradient(90deg,#6c63ff,#4facfe);color:#fff;border:none;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.filter-bar select{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:13px}.list-group{margin-bottom:16px}.list-group-header{font-size:13px;font-weight:700;color:var(--accent);background:var(--surface2);padding:6px 12px;border-radius:8px 8px 0 0;border-left:4px solid var(--accent);margin-bottom:2px}.entry-card{background:var(--surface);border:1px solid var(--border);padding:10px 12px;display:flex;align-items:center;gap:8px;border-top:none}.entry-card:last-child{border-radius:0 0 8px 8px}.entry-meta{flex:1}.entry-menu{font-size:13px;font-weight:600}.entry-sub{font-size:11px;color:var(--text-sub)}.entry-count{font-size:16px;font-weight:800;color:var(--accent2);min-width:60px;text-align:right}.del-btn{background:none;border:1px solid var(--border);color:var(--text-sub);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:14px}.del-btn:hover{border-color:var(--red);color:var(--red)}.diff-line{font-size:11px;margin-top:2px}.diff-up{color:#4caf50}.diff-down{color:#f44336}.diff-same{color:var(--text-sub)}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}.stat-num{font-size:24px;font-weight:800;color:var(--accent)}.stat-lbl{font-size:11px;color:var(--text-sub);margin-top:2px}.tags-area{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}.tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px}.rm{cursor:pointer;color:var(--text-sub)}.add-row{display:flex;gap:8px;margin-bottom:12px}.add-row input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:13px}.add-row button,.btn-danger{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer}.btn-danger{background:var(--red)}.section-title{font-size:13px;font-weight:700;color:var(--text-sub);margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px}#pera-modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:2000;display:none;flex-direction:column}#pera-modal.open{display:flex}.pera-controls{display:flex;gap:8px;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}.btn-print{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}.btn-close-pera{background:none;border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;margin-left:auto}.pera-scroll{flex:1;overflow-y:auto;padding:16px;background:#e8e8e8}.pera-page{width:100%;max-width:794px;margin:0 auto;background:#fff;color:#1a1a2e;border-radius:4px;overflow:hidden;font-family:-apple-system,sans-serif}.pera-header{background:linear-gradient(135deg,#1a1a2e,#6c63ff);color:#fff;padding:20px 24px}.pera-header-top{display:flex;justify-content:space-between;align-items:flex-start}.pera-title{font-size:22px;font-weight:900;letter-spacing:3px}.pera-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700}.pera-date{font-size:13px;opacity:.8;margin-top:4px}.pera-menu-tag{display:inline-block;background:rgba(255,255,255,.15);border-radius:12px;padding:3px 10px;font-size:12px;margin-top:6px}.pera-body{padding:20px 24px}.pera-section-title{font-size:13px;font-weight:800;color:#6c63ff;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #6c63ff;padding-bottom:4px;margin:16px 0 10px}.pera-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:4px}.pera-total-item{background:#f5f5ff;border-radius:8px;padding:10px;text-align:center}.pera-total-num{font-size:22px;font-weight:900;color:#6c63ff}.pera-total-label{font-size:10px;color:#666;margin-top:2px}.pera-rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}.pera-rank-medal{font-size:20px;width:28px;text-align:center}.pera-rank-name{font-size:14px;font-weight:700;flex:1}.pera-rank-bar-wrap{width:140px;height:8px;background:#eee;border-radius:4px;overflow:hidden}.pera-rank-bar-fill{height:100%;background:linear-gradient(90deg,#6c63ff,#4facfe);border-radius:4px}.pera-rank-val{font-size:13px;font-weight:800;min-width:50px;text-align:right}.pera-player-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.pera-player-card{background:#f8f8ff;border-radius:8px;padding:10px}.pera-player-name{font-size:13px;font-weight:700;margin-bottom:6px}.pera-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}.pera-bar-label{font-size:10px;color:#666;width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pera-bar-track{flex:1;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden}.pera-bar-fill{height:100%;border-radius:4px}.pera-bar-val{font-size:10px;font-weight:700;min-width:36px;text-align:right}.pera-footer{border-top:1px solid #eee;padding:10px 24px;display:flex;justify-content:space-between;font-size:10px;color:#999}.pera-growth-row{margin-bottom:8px}.pera-growth-name{font-size:12px;font-weight:700;margin-bottom:4px}.pera-growth-bar-row{display:flex;align-items:center;gap:6px}.pera-growth-bar-label{font-size:10px;color:#666;width:52px}.pera-growth-bar-track{flex:1;height:14px;background:#f0f0f0;border-radius:4px;position:relative;overflow:hidden}.pera-growth-bar-prev{position:absolute;top:0;left:0;height:100%;background:#ccc;border-radius:4px}.pera-growth-bar-curr{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#6c63ff,#4facfe);border-radius:4px;opacity:.85}.pera-growth-val{font-size:10px;font-weight:700;min-width:28px;text-align:right}.pera-growth-diff{font-size:10px;min-width:36px;text-align:right}.pera-growth-diff.up{color:#4caf50}.pera-growth-diff.down{color:#f44336}.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px}.legend-prev{background:#ccc}.legend-curr{background:linear-gradient(90deg,#6c63ff,#4facfe)}@media print{body>*:not(#pera-modal){display:none!important}#pera-modal{position:static!important;background:none!important;display:block!important}.pera-controls{display:none!important}.pera-scroll{overflow:visible!important;padding:0!important;background:none!important}.pera-page{max-width:100%!important}}</style>
</head>
<body>
<header class="app-header"><div class="app-title">⚡ VORTEX</div><div style="display:flex;gap:8px;align-items:center"><button class="btn-print" onclick="openPera()" style="font-size:12px;padding:6px 12px">📄 レポート</button><div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">接続中</span></div></div></header>
<nav class="tab-bar"><button class="tab-btn active" onclick="showTab('record')">📝 記録</button><button class="tab-btn" onclick="showTab('list')">📋 一覧</button><button class="tab-btn" onclick="showTab('stats')">📊 集計</button><button class="tab-btn" onclick="showTab('settings')">⚙️ 設定</button></nav>
<div id="tab-record" class="tab-content active"><div class="record-topbar"><div class="topbar-field"><label>日付</label><input type="date" id="inp-date"></div><div class="topbar-field"><label>メニュー</label><select id="inp-menu" onchange="updateUnitLabels()"></select></div></div><div id="player-list"></div><button class="btn-save-all" onclick="saveAll()">💾 全員まとめて保存</button></div>
<div id="tab-list" class="tab-content"><div class="filter-bar"><select id="fl-player" onchange="renderList()"><option value="">全選手</option></select><select id="fl-menu" onchange="renderList()"><option value="">全メニュー</option></select></div><div id="list-container"></div></div>
<div id="tab-stats" class="tab-content"><div class="filter-bar"><select id="st-player" onchange="renderStats()"><option value="">全選手</option></select><select id="st-menu" onchange="renderStats()"><option value="">全メニュー</option></select></div><div id="stats-container"></div></div>
<div id="tab-settings" class="tab-content"><div class="section-title">選手</div><div class="tags-area" id="player-tags"></div><div class="add-row"><input type="text" id="new-player" placeholder="選手名を追加"><button onclick="addPlayer()">追加</button></div><div class="section-title">メニュー</div><div class="tags-area" id="menu-tags"></div><div class="add-row"><input type="text" id="new-menu" placeholder="メニューを追加"><button onclick="addMenu()">追加</button></div><div class="section-title">データ</div><button class="btn-danger" onclick="clearAll()">🗑️ 全データ削除</button></div>
<div class="toast" id="toast"></div>
<div id="pera-modal"><div class="pera-controls"><button class="btn-print" onclick="window.print()">🖨️ 印刷 / PDF保存</button><button class="btn-close-pera" onclick="closePera()">✕ 閉じる</button></div><div class="pera-scroll"><div class="pera-page" id="pera-content"></div></div></div>
<script>
const FB='https://vortex-handling-default-rtdb.asia-southeast1.firebasedatabase.app',FP='/vortex-state',RUN='２０M走';
let state={players:['りんたろう','きっぺい','さくのすけ','ゆうせい','だん'],menus:['頭回し右','頭回し左','胴回し右','胴回し左','膝回し右','膝回し左','八の字前','八の字後','縄跳び','２０Mシャトルラン','２０M走'],entries:[]},saveTimer=null,isSaving=false;
function fbGet(){return fetch(FB+FP+'.json').then(r=>r.ok?r.json():null).catch(()=>null)}
function fbSet(d){return fetch(FB+FP+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(()=>{})}
function startSync(){setSS('online');fbGet().then(d=>{if(d){state={...d,entries:d.entries||[]};setSS('online');renderAll()}else fbSet(state)}).catch(()=>setSS('offline'));setInterval(()=>{if(isSaving)return;fbGet().then(d=>{if(d){const inputs=getInputVals();state={...d,entries:d.entries||[]};renderAllKeepInputs(inputs);setSS('online')}}).catch(()=>setSS('offline'))},10000)}
function getInputVals(){const vals={};document.querySelectorAll('.count-input').forEach(el=>{if(el.value)vals[el.id]=el.value});return vals}
function renderAllKeepInputs(vals){refreshSelects();renderList();renderStats();renderTags();if(Object.keys(vals).length===0)return;Object.entries(vals).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v})}
function setSS(s){const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');if(!d)return;if(s==='online'){d.className='sync-dot';l.textContent='同期中'}else{d.className='sync-dot offline';l.textContent='オフライン'}}
function save(){clearTimeout(saveTimer);isSaving=true;saveTimer=setTimeout(()=>{fbSet(state).then(()=>{setSS('online');isSaving=false}).catch(()=>{setSS('offline');isSaving=false})},500)}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function showToast(m,c){const t=document.getElementById('toast');if(!t)return;t.textContent=m;t.style.background=c||'#333';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200)}
function showTab(n){document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));document.getElementById('tab-'+n)?.classList.add('active');const ns=['record','list','stats','settings'],i=ns.indexOf(n);document.querySelectorAll('.tab-btn')[i]?.classList.add('active');if(n==='list')renderList();if(n==='stats')renderStats();if(n==='settings')renderTags()}
function isRun(m){return(m||document.getElementById('inp-menu')?.value)===RUN}
function updateUnitLabels(){const r=isRun();document.querySelectorAll('.unit-label').forEach(e=>e.textContent=r?'秒':'回');document.querySelectorAll('.count-input').forEach(e=>{e.placeholder=r?'0.00':'0';e.step=r?'0.01':'1';e.min='0'})}
function cStr(c,m){return isRun(m)?c.toFixed(2)+'秒':c.toLocaleString()+'回'}
function renderAll(){renderPlayerList();refreshSelects();renderList();renderStats();renderTags()}
function renderPlayerList(){const c=document.getElementById('player-list');if(!c)return;c.innerHTML=state.players.map((p,i)=>`<div class="player-row"><div class="player-name">${p}</div><input class="count-input" type="number" id="cnt-${i}" min="0" placeholder="0" inputmode="decimal" step="0.01" oninput="updateTotal()"><span class="unit-label" id="unit-${i}">回</span><button class="btn-save" onclick="saveSingle(${i},'${p.replace(/'/g,"\\'")}')">保存</button></div>`).join('');updateUnitLabels()}
function refreshSelects(){['fl-player','st-player'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const c=s.value;s.innerHTML='<option value="">全選手</option>'+state.players.map(p=>`<option value="${p}">${p}</option>`).join('');s.value=c});['fl-menu','st-menu','inp-menu'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const c=s.value,e=id==='inp-menu'?'':'<option value="">全メニュー</option>';s.innerHTML=e+state.menus.map(m=>`<option value="${m}">${m}</option>`).join('');s.value=c||(id==='inp-menu'?state.menus[0]:'')});updateUnitLabels()}
function updateTotal(){}
function getPrev(pl,mn,dt){const p=state.entries.filter(e=>e.player===pl&&e.menu===mn&&e.date<dt).sort((a,b)=>b.date.localeCompare(a.date));return p.length>0?p[0].count:null}
function saveSingle(i,player){const date=document.getElementById('inp-date')?.value||today(),menu=document.getElementById('inp-menu')?.value;if(!menu){showToast('メニューを選択してください','var(--accent2)');return}const el=document.getElementById('cnt-'+i),count=parseFloat(el?.value)||0;if(count<=0){showToast(isRun(menu)?'タイムを入力してください（秒）':'回数を入力してください','var(--accent2)');return}const xi=state.entries.findIndex(e=>e.player===player&&e.menu===menu&&e.date===date);if(xi>=0)state.entries[xi].count=count;else state.entries.push({id:Date.now()+i,date,player,menu,count});save();el.value='';showToast(player+' の記録を保存しました ✓','var(--accent)')}
function saveAll(){const date=document.getElementById('inp-date')?.value||today(),menu=document.getElementById('inp-menu')?.value;if(!menu){showToast('メニューを選択してください','var(--accent2)');return}let saved=0;state.players.forEach((p,i)=>{const count=parseFloat(document.getElementById('cnt-'+i)?.value)||0;if(count>0){const xi=state.entries.findIndex(e=>e.player===p&&e.menu===menu&&e.date===date);if(xi>=0)state.entries[xi].count=count;else state.entries.push({id:Date.now()+i,date,player:p,menu,count});saved++}});if(!saved){showToast('回数を入力してください','var(--accent2)');return}save();document.querySelectorAll('.count-input').forEach(e=>e.value='');showToast(saved+'件保存しました ✓','var(--accent)')}
function renderList(){const fp=document.getElementById('fl-player')?.value||'',fm=document.getElementById('fl-menu')?.value||'',c=document.getElementById('list-container');if(!c)return;let entries=[...state.entries];if(fp)entries=entries.filter(e=>e.player===fp);if(fm)entries=entries.filter(e=>e.menu===fm);entries.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);if(!entries.length){c.innerHTML='<div style="text-align:center;color:#888;padding:32px">記録がありません</div>';return}const gr={};entries.forEach(e=>{if(!gr[e.player])gr[e.player]=[];gr[e.player].push(e)});let h='';Object.keys(gr).forEach(pl=>{h+=`<div class="list-group"><div class="list-group-header">${pl}</div>`;gr[pl].forEach(e=>{const pv=getPrev(e.player,e.menu,e.date);let dh='';if(pv!==null){const d=isRun(e.menu)?pv-e.count:e.count-pv,s=d>0?'▲':d<0?'▼':'－',cl=d>0?'diff-up':d<0?'diff-down':'diff-same';dh=`<div class="diff-line ${cl}">${s}${isRun(e.menu)?Math.abs(d).toFixed(2)+'秒':Math.abs(d).toLocaleString()+'回'} (vs 前回)</div>`}h+=`<div class="entry-card"><div class="entry-meta"><div class="entry-menu">${e.menu}</div><div class="entry-sub">${e.date}</div>${dh}</div><div class="entry-count">${cStr(e.count,e.menu)}</div><button class="del-btn" onclick="delEntry(${e.id})">×</button></div>`});h+='</div>'});c.innerHTML=h}
function delEntry(id){if(!confirm('この記録を削除しますか？'))return;state.entries=state.entries.filter(e=>e.id!==id);save();renderList();showToast('削除しました','#666')}
function renderStats(){const fp=document.getElementById('st-player')?.value||'',fm=document.getElementById('st-menu')?.value||'',c=document.getElementById('stats-container');if(!c)return;let entries=[...state.entries];if(fp)entries=entries.filter(e=>e.player===fp);if(fm)entries=entries.filter(e=>e.menu===fm);const total=entries.reduce((s,e)=>s+e.count,0),pls=[...new Set(entries.map(e=>e.player))],dts=[...new Set(entries.map(e=>e.date))],best=entries.reduce((b,e)=>(!b||e.count>b.count)?e:b,null);c.innerHTML=`<div class="stat-grid"><div class="stat-card"><div class="stat-num">${total.toLocaleString()}</div><div class="stat-lbl">総回数</div></div><div class="stat-card"><div class="stat-num">${pls.length}</div><div class="stat-lbl">選手数</div></div><div class="stat-card"><div class="stat-num">${dts.length}</div><div class="stat-lbl">練習日数</div></div><div class="stat-card"><div class="stat-num">${best?best.player:'-'}</div><div class="stat-lbl">最多 ${best?cStr(best.count,best.menu):''}</div></div></div>`}
function renderTags(){const pt=document.getElementById('player-tags');if(pt)pt.innerHTML=state.players.map(p=>`<div class="tag">${p}<span class="rm" onclick="removePlayer('${p}')">✕</span></div>`).join('');const mt=document.getElementById('menu-tags');if(mt)mt.innerHTML=state.menus.map(m=>`<div class="tag">${m}<span class="rm" onclick="removeMenu('${m}')">✕</span></div>`).join('')}
function addPlayer(){const v=document.getElementById('new-player').value.trim();if(!v||state.players.includes(v))return;state.players.push(v);save();renderAll();document.getElementById('new-player').value=''}
function removePlayer(p){if(!confirm(`「${p}」を削除しますか？`))return;state.players=state.players.filter(x=>x!==p);save();renderAll()}
function addMenu(){const v=document.getElementById('new-menu').value.trim();if(!v||state.menus.includes(v))return;state.menus.push(v);save();renderAll();document.getElementById('new-menu').value=''}
function removeMenu(m){if(!confirm(`「${m}」を削除しますか？`))return;state.menus=state.menus.filter(x=>x!==m);save();renderAll()}
function clearAll(){if(!confirm('全データを削除しますか？この操作は取り消せません。'))return;state.entries=[];save();renderList();renderStats();showToast('削除しました','#666')}
function openPera(){const m=document.getElementById('pera-modal');if(!m)return;m.classList.add('open');renderPera()}
function closePera(){document.getElementById('pera-modal')?.classList.remove('open')}
function getPrevDE(date){const ds=[...new Set(state.entries.filter(e=>e.date<date).map(e=>e.date))].sort().reverse();if(!ds.length)return[];return state.entries.filter(e=>e.date===ds[0])}
function renderPera(){const menu=document.getElementById('inp-menu')?.value||state.menus[0]||'',date=document.getElementById('inp-date')?.value||today(),entries=state.entries.filter(e=>e.menu===menu&&e.date===date),prev=getPrevDE(date).filter(e=>e.menu===menu),r=isRun(menu);if(!entries.length){document.getElementById('pera-content').innerHTML='<div style="padding:40px;text-align:center;color:#999">この日の記録がありません</div>';return}const tot=entries.reduce((s,e)=>s+e.count,0),avg=tot/entries.length,sorted=[...entries].sort((a,b)=>r?a.count-b.count:b.count-a.count),maxC=sorted[0]?.count||1,medals=['🥇','🥈','🥉'];const rankH=sorted.slice(0,5).map((p,i)=>{const pct=Math.round((r?maxC/p.count:p.count/maxC)*100);return`<div class="pera-rank-row"><div class="pera-rank-medal">${medals[i]||''}</div><div style="font-size:12px;color:#c47f3a;font-weight:700">${i+1}</div><div class="pera-rank-name">${p.player}</div><div class="pera-rank-bar-wrap"><div class="pera-rank-bar-fill" style="width:${pct}%"></div></div><div class="pera-rank-val">${cStr(p.count,menu)}</div></div>`}).join('');const colors=['#6c63ff','#4facfe','#f5a623','#4caf50','#e91e63','#00bcd4'];const cardH=entries.map((e,i)=>{const bw=Math.round((r?maxC/e.count:e.count/maxC)*100);return`<div class="pera-player-card"><div class="pera-player-name">${e.player}</div><div class="pera-bar-row"><div class="pera-bar-label">${menu.length>6?menu.substring(0,6):menu}</div><div class="pera-bar-track"><div class="pera-bar-fill" style="width:${bw}%;background:${colors[i%colors.length]}"></div></div><div class="pera-bar-val">${cStr(e.count,menu)}</div></div></div>`}).join('');let gH='';if(prev.length>0){const pd=prev[0]?.date||'',gr=entries.map(e=>{const pv=prev.find(p=>p.player===e.player);if(!pv)return'';const mx=Math.max(e.count,pv.count)||1,cw=Math.round((e.count/mx)*100),pw=Math.round((pv.count/mx)*100),d=r?pv.count-e.count:e.count-pv.count,ds=d>0?`<span class="pera-growth-diff up">▲${r?Math.abs(d).toFixed(2)+'秒':Math.abs(d).toLocaleString()+'回'}</span>`:d<0?`<span class="pera-growth-diff down">▼${r?Math.abs(d).toFixed(2)+'秒':Math.abs(d).toLocaleString()+'回'}</span>`:'<span class="pera-growth-diff">－</span>';return`<div class="pera-growth-row"><div class="pera-growth-name">${e.player}</div><div><div class="pera-growth-bar-row"><div class="pera-growth-bar-label" style="font-size:9px;color:#999">前回${pd}</div><div class="pera-growth-bar-track"><div class="pera-growth-bar-prev" style="width:${pw}%"></div></div><div class="pera-growth-val" style="font-size:9px;color:#999">${cStr(pv.count,menu)}</div></div><div class="pera-growth-bar-row"><div class="pera-growth-bar-label" style="font-size:9px">今回</div><div class="pera-growth-bar-track"><div class="pera-growth-bar-curr" style="width:${cw}%"></div></div><div class="pera-growth-val" style="font-size:9px">${cStr(e.count,menu)}</div>${ds}</div></div></div>`}).filter(Boolean).join('');if(gr)gH=`<div class="pera-section-title">📈 前回比較・成長グラフ</div><div style="display:flex;gap:12px;font-size:10px;color:#666;margin-bottom:6px"><span><span class="legend-dot legend-prev"></span>前回</span><span><span class="legend-dot legend-curr"></span>今回</span><span style="margin-left:8px">▲＝${r?'短縮':'増加'} ▼＝${r?'増加':'減少'}</span></div>${gr}`}document.getElementById('pera-content').innerHTML=`<div class="pera-header"><div class="pera-header-top"><div class="pera-title">VORTEX</div><div class="pera-badge">PRACTICE REPORT</div></div><div class="pera-date">${date}</div><div class="pera-menu-tag">${menu}</div></div><div class="pera-body"><div class="pera-section-title">📋 サマリー</div><div class="pera-summary"><div class="pera-total-item"><div class="pera-total-num">${r?tot.toFixed(2):tot.toLocaleString()}</div><div class="pera-total-label">${r?'合計タイム':'合計回数'}</div></div><div class="pera-total-item"><div class="pera-total-num">${entries.length}</div><div class="pera-total-label">参加人数</div></div><div class="pera-total-item"><div class="pera-total-num">${r?avg.toFixed(2):Math.round(avg).toLocaleString()}</div><div class="pera-total-label">${r?'平均タイム':'平均回数'}</div></div><div class="pera-total-item"><div class="pera-total-num" style="font-size:14px">${sorted[0]?.player||'-'}</div><div class="pera-total-label">${r?'最速':'トップ選手'}</div></div></div><div class="pera-section-title">🏅 ランキング</div>${rankH}${gH}<div class="pera-section-title">📊 選手別</div><div class="pera-player-cards">${cardH}</div></div><div class="pera-footer"><span>⚡ VORTEX ハンドリング記録</span><span>生成日時: ${new Date().toLocaleString('ja-JP')}</span></div>`}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('inp-date').value=today();startSync()});
</script>
</body>
