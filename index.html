<style>:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#16213e;--border:#2a2a4a;--accent:#6c63ff;--accent2:#f5a623;--text:#e0e0f0;--text-sub:#8888aa;--radius:12px;--green:#4caf50;--red:#f44336}*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh}.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.app-title{font-size:18px;font-weight:800;color:var(--accent)}.sync-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-sub)}.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}.sync-dot.offline{background:var(--red)}.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99}.tab-btn{flex:1;padding:12px 4px;border:none;background:none;color:var(--text-sub);font-size:12px;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}.tab-content{display:none;padding:16px;max-width:600px;margin:0 auto}.tab-content.active{display:block}.record-topbar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}.topbar-field{display:flex;flex-direction:column;gap:4px}.topbar-field label{font-size:11px;color:var(--text-sub);font-weight:600}.topbar-field input,.topbar-field select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:14px}.player-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}.player-name{font-weight:700;font-size:14px;min-width:80px}.count-input{width:80px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:16px;text-align:center}.count-input:disabled{opacity:0.3;cursor:not-allowed}.unit-label{font-size:12px;color:var(--text-sub);font-weight:600;min-width:14px}.btn-save{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}.btn-save:disabled{opacity:0.4;cursor:not-allowed}.btn-save-all{width:100%;background:linear-gradient(90deg,#6c63ff,#4facfe);color:#fff;border:none;padding:12px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;margin-top:8px}.absent-label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--accent2);cursor:pointer;white-space:nowrap}.absent-label input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent2);cursor:pointer}.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.filter-bar{display:flex;gap:8px;margin-bottom:14px}.filter-bar select{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:8px;font-size:13px}.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}.stat-num{font-size:24px;font-weight:800;color:var(--accent)}.stat-lbl{font-size:11px;color:var(--text-sub);margin-top:2px}.player-growth-section{margin-top:16px}.player-growth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}.player-growth-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.player-growth-name{font-size:16px;font-weight:800;color:var(--accent)}.player-growth-stats{display:flex;gap:12px;font-size:11px;color:var(--text-sub);margin-bottom:6px}.player-growth-stat{text-align:center}.player-growth-stat .val{font-size:16px;font-weight:700;color:var(--text);display:block}.player-growth-stat .lbl{font-size:10px;margin-top:1px}.chart-wrap{position:relative;height:160px;margin-top:8px}.growth-diff-positive{color:var(--green);font-weight:700}.growth-diff-negative{color:var(--red);font-weight:700}.list-group{margin-bottom:12px}.list-group-header{font-size:13px;font-weight:700;color:var(--accent);padding:6px 2px;border-bottom:1px solid var(--border);margin-bottom:6px}.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}.entry-meta{flex:1}.entry-menu{font-size:13px;font-weight:600}.entry-sub{font-size:11px;color:var(--text-sub);margin-top:2px}.entry-count{font-size:18px;font-weight:800;color:var(--accent2);margin-right:8px}.diff-up{color:var(--green);font-size:11px}.diff-down{color:var(--red);font-size:11px}.diff-same{color:var(--text-sub)}.del-btn{background:none;border:none;color:var(--text-sub);font-size:16px;cursor:pointer;padding:4px}.section-title{font-size:13px;font-weight:700;color:var(--text-sub);text-transform:uppercase;letter-spacing:.5px;margin:16px 0 8px}.tags-area{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}.tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;display:flex;align-items:center;gap:4px}.rm{cursor:pointer;color:var(--text-sub)}.add-row{display:flex;gap:8px;margin-bottom:12px}.add-row input{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:13px}.add-row button,.btn-danger{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer}.btn-danger{background:var(--red)}.btn-print{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}#pera-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;flex-direction:column}#pera-modal.open{display:flex}.pera-controls{background:#222;padding:12px 16px;display:flex;gap:10px;justify-content:flex-end}.btn-close-pera{background:#555;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer}.pera-scroll{flex:1;overflow-y:auto;padding:24px;background:#f0f0f0}.pera-page{max-width:800px;margin:0 auto;background:#fff;padding:32px;border-radius:4px;box-shadow:0 2px 16px rgba(0,0,0,.2)}.pera-title{text-align:center;font-size:22px;font-weight:800;color:#1a1a2e;margin-bottom:4px}.pera-sub{text-align:center;font-size:12px;color:#666;margin-bottom:24px;display:flex;justify-content:center;gap:16px}.pera-section-title{font-size:15px;font-weight:700;color:#333;border-bottom:2px solid #6c63ff;padding-bottom:4px;margin:20px 0 12px}.pera-rank-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0}.pera-rank-medal{font-size:20px;width:28px;text-align:center}.pera-rank-name{font-size:14px;font-weight:700;flex:1}.pera-rank-bar-wrap{width:140px;height:8px;background:#eee;border-radius:4px;overflow:hidden}.pera-rank-bar-fill{height:100%;background:linear-gradient(90deg,#6c63ff,#4facfe);border-radius:4px}.pera-rank-val{font-size:13px;font-weight:800;min-width:50px;text-align:right}.pera-player-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}.pera-player-card{background:#f8f8ff;border-radius:8px;padding:12px;border:1px solid #e0e0ff}.pera-player-name{font-size:14px;font-weight:700;margin-bottom:8px;color:#1a1a2e;border-bottom:1px solid #ddd;padding-bottom:4px}.pera-bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}.pera-bar-label{font-size:10px;color:#666;width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pera-bar-track{flex:1;height:8px;background:#e8e8e8;border-radius:4px;overflow:hidden}.pera-bar-fill{height:100%;border-radius:4px}.pera-bar-val{font-size:12px;font-weight:700;min-width:40px;text-align:right}.pera-growth-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}.pera-growth-name{font-size:12px;font-weight:700;width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.pera-growth-bar-row{display:flex;align-items:center;gap:4px;flex:1}.pera-growth-bar-label{font-size:9px;color:#999;width:28px}.pera-growth-bar-track{flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden;position:relative}.pera-growth-bar-prev{position:absolute;top:0;left:0;height:100%;background:#ccc;border-radius:4px}.pera-growth-bar-curr{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,#6c63ff,#4facfe);border-radius:4px;opacity:.85}.pera-growth-val{font-size:10px;font-weight:700;min-width:28px;text-align:right}.pera-growth-diff{font-size:10px;min-width:36px;text-align:right}.pera-growth-diff.up{color:#4caf50}.pera-growth-diff.down{color:#f44336}.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;margin-right:3px}.legend-prev{background:#ccc}.legend-curr{background:linear-gradient(90deg,#6c63ff,#4facfe)}.pera-player-section{margin-top:16px;page-break-inside:avoid}.pera-player-header{font-size:13px;font-weight:700;color:#1a1a2e;background:#e8e8ff;padding:8px 10px;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}.pera-player-best{font-size:12px;color:#6c63ff;font-weight:800}.pera-stats-row{display:flex;gap:12px;margin-bottom:8px}.pera-stat-item{background:#fff;border:1px solid #e0e0ee;border-radius:6px;padding:6px 10px;text-align:center;flex:1}.pera-stat-num{font-size:16px;font-weight:800;color:#6c63ff}.pera-stat-lbl{font-size:9px;color:#888;margin-top:1px}@media print{body>*:not(#pera-modal){display:none!important}#pera-modal{position:static!important;background:none!important;display:flex!important;flex-direction:column}.pera-controls{display:none!important}.pera-scroll{overflow:visible!important;padding:0!important;background:none!important}.pera-page{max-width:100%!important;box-shadow:none!important}}</style></head>
<body>
<header class="app-header"><div class="app-title">⚡ VORTEX</div><div style="display:flex;gap:8px;align-items:center"><button class="btn-print" onclick="openPera()" style="font-size:12px;padding:6px 12px">📄 レポート</button><div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">接続中</span></div></div></header>
<nav class="tab-bar"><button class="tab-btn active" onclick="showTab('record')">📝 記録</button><button class="tab-btn" onclick="showTab('list')">📋 一覧</button><button class="tab-btn" onclick="showTab('stats')">📊 集計</button><button class="tab-btn" onclick="showTab('settings')">⚙️ 設定</button></nav>
<div id="tab-record" class="tab-content active"><div class="record-topbar"><div class="topbar-field"><label>日付</label><input type="date" id="inp-date"></div><div class="topbar-field"><label>メニュー</label><select id="inp-menu" onchange="updateUnitLabels()"></select></div></div><div id="player-list"></div><button class="btn-save-all" onclick="saveAll()">💾 全員まとめて保存</button></div>
<div id="tab-list" class="tab-content"><div class="filter-bar"><select id="fl-player" onchange="renderList()"><option value="">全選手</option></select><select id="fl-menu" onchange="renderList()"><option value="">全メニュー</option></select></div><div id="list-container"></div></div>
<div id="tab-stats" class="tab-content"><div class="filter-bar"><select id="st-player" onchange="renderStats()"><option value="">全選手</option></select><select id="st-menu" onchange="renderStats()"><option value="">全メニュー</option></select></div><div id="stats-container"></div></div>
<div id="tab-settings" class="tab-content"><div class="section-title">選手</div><div class="tags-area" id="player-tags"></div><div class="add-row"><input type="text" id="new-player" placeholder="選手名を追加"><button onclick="addPlayer()">追加</button></div><div class="section-title">メニュー</div><div class="tags-area" id="menu-tags"></div><div class="add-row"><input type="text" id="new-menu" placeholder="メニューを追加"><button onclick="addMenu()">追加</button></div><div class="section-title">データ</div><button class="btn-danger" onclick="clearAll()">🗑️ 全データ削除</button></div>
<div class="toast" id="toast"></div>
<div id="pera-modal"><div class="pera-controls"><button class="btn-print" onclick="window.print()">🖨️ 印刷 / PDF保存</button><button class="btn-close-pera" onclick="closePera()">✕ 閉じる</button></div><div class="pera-scroll"><div class="pera-page" id="pera-content"></div></div></div>
<script>
const FB='https://vortex-handling-default-rtdb.asia-southeast1.firebasedatabase.app',FP='/vortex-state',RUN='２０M走';
let state={players:['りんたろう','きっぺい','さくのすけ','ゆうせい','だん'],menus:['頭回し右','頭回し左','胴回し右','胴回し左','膝回し右','膝回し左','八の字前','八の字後','縄跳び','２０Mシャトルラン','２０M走'],entries:[]},saveTimer=null,isSaving=false;
let _charts={};
function fbGet(){return fetch(FB+FP+'.json').then(r=>r.ok?r.json():null).catch(()=>null)}
function fbSet(d){return fetch(FB+FP+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}).catch(()=>{})}
function startSync(){setSS('online');fbGet().then(d=>{if(d){state={...d,entries:d.entries||[]};setSS('online');renderAll()}else fbSet(state)}).catch(()=>setSS('offline'));setInterval(()=>{if(isSaving)return;fbGet().then(d=>{if(d){const inputs=getInputVals();state={...d,entries:d.entries||[]};renderAllKeepInputs(inputs);setSS('online')}}).catch(()=>setSS('offline'))},10000)}
function getInputVals(){const vals={};document.querySelectorAll('.count-input').forEach(el=>{if(el.value)vals[el.id]=el.value});return vals}
function renderAllKeepInputs(inputs){renderPlayerList();refreshSelects();renderList();renderStats();renderTags();Object.entries(inputs).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.value=v})}
function setSS(s){const d=document.getElementById('sync-dot'),l=document.getElementById('sync-label');if(!d)return;if(s==='online'){d.className='sync-dot';l.textContent='同期中'}else{d.className='sync-dot offline';l.textContent='オフライン'}}
function save(){clearTimeout(saveTimer);isSaving=true;saveTimer=setTimeout(()=>{fbSet(state).then(()=>{setSS('online');isSaving=false}).catch(()=>{setSS('offline');isSaving=false})},500)}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function showToast(msg,color){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.style.background=color||'#333';t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2000)}
function showTab(name){document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));const tab=document.getElementById('tab-'+name);if(tab)tab.classList.add('active');[...document.querySelectorAll('.tab-btn')].forEach(b=>{if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes(name))b.classList.add('active')});if(name==='stats')renderStats()}
function isRun(menu){return menu===RUN}
function updateUnitLabels(){const menu=document.getElementById('inp-menu')?.value||'';const run=isRun(menu);document.querySelectorAll('.unit-label').forEach(el=>el.textContent=run?'秒':'回');document.querySelectorAll('.count-input').forEach(el=>{el.step=run?'0.01':'1';el.placeholder=run?'0.00':'0'})}
function cStr(n,menu){return isRun(menu)?n.toFixed(2)+'秒':n.toLocaleString()+'回'}
function renderPlayerList(){const c=document.getElementById('player-list');if(!c)return;c.innerHTML=state.players.map((p,i)=>'<div class="player-row"><div class="player-name">'+p+'</div><input class="count-input" type="number" id="cnt-'+i+'" min="0" placeholder="0" inputmode="decimal" step="0.01" oninput="updateTotal()"><span class="unit-label" id="unit-'+i+'">回</span><label class="absent-label"><input type="checkbox" id="abs-'+i+'" onchange="toggleAbsent('+i+')"> 欠席</label><button class="btn-save" id="save-'+i+'" onclick="saveSingle('+i+')">保存</button></div>').join('');updateUnitLabels()}
function toggleAbsent(i){const cb=document.getElementById('abs-'+i),inp=document.getElementById('cnt-'+i),btn=document.getElementById('save-'+i);if(cb&&cb.checked){inp.value='';inp.disabled=true;if(btn)btn.disabled=true}else{inp.disabled=false;if(btn)btn.disabled=false}}
function refreshSelects(){['fl-player','st-player'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const v=s.value;s.innerHTML='<option value="">全選手</option>'+state.players.map(p=>'<option value="'+p+'">'+p+'</option>').join('');s.value=v});['fl-menu','st-menu'].forEach(id=>{const s=document.getElementById(id);if(!s)return;const v=s.value;s.innerHTML='<option value="">全メニュー</option>'+state.menus.map(m=>'<option value="'+m+'">'+m+'</option>').join('');s.value=v});const im=document.getElementById('inp-menu');if(im){const v=im.value;im.innerHTML=state.menus.map(m=>'<option value="'+m+'">'+m+'</option>').join('');if(v)im.value=v}}
function updateTotal(){}
function getPrev(pl,mn,dt){const p=state.entries.filter(e=>e.player===pl&&e.menu===mn&&e.date<dt&&!e.absent).sort((a,b)=>b.date.localeCompare(a.date));return p.length>0?p[0].count:null}
function saveSingle(i){const player=state.players[i];if(!player)return;const date=document.getElementById('inp-date')?.value||today(),menu=document.getElementById('inp-menu')?.value;if(!menu){showToast('メニューを選択してください','var(--accent2)');return}const cb=document.getElementById('abs-'+i);if(cb&&cb.checked){const xi=state.entries.findIndex(e=>e.player===player&&e.menu===menu&&e.date===date);const ae={id:Date.now()+i,date,player,menu,count:0,absent:true};if(xi>=0)state.entries[xi]={...ae,id:state.entries[xi].id};else state.entries.push(ae);save();showToast(player+' 欠席を記録','var(--accent2)');return}const el=document.getElementById('cnt-'+i),count=parseFloat(el?.value)||0;if(count<=0){showToast(isRun(menu)?'タイムを入力してください（秒）':'回数を入力してください','var(--accent2)');return}const xi=state.entries.findIndex(e=>e.player===player&&e.menu===menu&&e.date===date);if(xi>=0)state.entries[xi]={...state.entries[xi],count,absent:false};else state.entries.push({id:Date.now()+i,date,player,menu,count,absent:false});save();el.value='';showToast(player+' 保存しました')}
function saveAll(){const date=document.getElementById('inp-date')?.value||today(),menu=document.getElementById('inp-menu')?.value;if(!menu){showToast('メニューを選択してください','var(--accent2)');return}let saved=0;state.players.forEach((p,i)=>{const cb=document.getElementById('abs-'+i);if(cb&&cb.checked){const xi=state.entries.findIndex(e=>e.player===p&&e.menu===menu&&e.date===date);const ae={id:Date.now()+i,date,player:p,menu,count:0,absent:true};if(xi>=0)state.entries[xi]={...ae,id:state.entries[xi].id};else state.entries.push(ae);saved++;return}const count=parseFloat(document.getElementById('cnt-'+i)?.value)||0;if(count>0){const xi=state.entries.findIndex(e=>e.player===p&&e.menu===menu&&e.date===date);if(xi>=0)state.entries[xi]={...state.entries[xi],count,absent:false};else state.entries.push({id:Date.now()+i,date,player:p,menu,count,absent:false});saved++}});if(!saved){showToast('回数を入力してください','var(--accent2)');return}save();document.querySelectorAll('.count-input').forEach(e=>{e.value='';e.disabled=false});document.querySelectorAll('[id^=abs-]').forEach(e=>{if(e.type==='checkbox')e.checked=false});document.querySelectorAll('[id^=save-]').forEach(e=>e.disabled=false);showToast(saved+'人分保存しました')}
function renderList(){const fp=document.getElementById('fl-player')?.value||'',fm=document.getElementById('fl-menu')?.value||'',c=document.getElementById('list-container');if(!c)return;let entries=[...state.entries];if(fp)entries=entries.filter(e=>e.player===fp);if(fm)entries=entries.filter(e=>e.menu===fm);entries.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);if(!entries.length){c.innerHTML='<div style="text-align:center;color:#888;padding:32px">記録がありません</div>';return}const gr={};entries.forEach(e=>{if(!gr[e.player])gr[e.player]=[];gr[e.player].push(e)});let h='';Object.keys(gr).forEach(pl=>{h+='<div class="list-group"><div class="list-group-header">'+pl+'</div>';gr[pl].forEach(e=>{const pv=getPrev(e.player,e.menu,e.date);let diff='';if(e.absent){diff='<span style="color:var(--accent2);font-size:11px">欠席</span>'}else if(pv!==null){const d=isRun(e.menu)?pv-e.count:e.count-pv;diff=d>0?'<span class="diff-up">▲'+cStr(Math.abs(d),e.menu)+'</span>':d<0?'<span class="diff-down">▼'+cStr(Math.abs(d),e.menu)+'</span>':'<span class="diff-same">―</span>'}h+='<div class="entry-card"><div class="entry-meta"><div class="entry-menu">'+e.menu+'</div><div class="entry-sub">'+e.date+'</div></div>'+(e.absent?'<span class="entry-count" style="color:var(--accent2);font-size:13px">欠席</span>':'<div class="entry-count">'+cStr(e.count,e.menu)+'</div>')+diff+'<button class="del-btn" onclick="delEntry(''+e.id+'')">×</button></div>'});h+='</div>'});c.innerHTML=h}
function delEntry(id){state.entries=state.entries.filter(e=>String(e.id)!==String(id));save();renderList();renderStats()}
function renderStats(){const fp=document.getElementById('st-player')?.value||'',fm=document.getElementById('st-menu')?.value||'',c=document.getElementById('stats-container');if(!c)return;Object.values(_charts).forEach(ch=>{try{ch.destroy()}catch(e){}});_charts={};let entries=[...state.entries].filter(e=>!e.absent);if(fp)entries=entries.filter(e=>e.player===fp);if(fm)entries=entries.filter(e=>e.menu===fm);const allPlayers=fp?[fp]:state.players.filter(p=>state.entries.some(e=>e.player===p));const dts=[...new Set(entries.map(e=>e.date))].sort();const best=entries.reduce((b,e)=>(!b||e.count>b.count)?e:b,null);let html='<div class="stat-grid"><div class="stat-card"><div class="stat-num">'+allPlayers.length+'</div><div class="stat-lbl">選手数</div></div><div class="stat-card"><div class="stat-num">'+dts.length+'</div><div class="stat-lbl">練習日数</div></div><div class="stat-card" style="grid-column:span 2"><div class="stat-num">'+(best?best.player:'-')+'</div><div class="stat-lbl">最多記録 '+(best?cStr(best.count,best.menu)+' ('+best.menu+')':'')+'</div></div></div>';if(allPlayers.length>0){html+='<div class="player-growth-section">';allPlayers.forEach(pl=>{const plE=entries.filter(e=>e.player===pl);if(!plE.length)return;const menus=fm?[fm]:[...new Set(plE.map(e=>e.menu))];menus.forEach(mn=>{const mnE=plE.filter(e=>e.menu===mn).sort((a,b)=>a.date.localeCompare(b.date));if(!mnE.length)return;const counts=mnE.map(e=>e.count);const maxC=Math.max(...counts),latestC=counts[counts.length-1],firstC=counts[0];const growth=isRun(mn)?firstC-latestC:latestC-firstC;const growthStr=growth>0?'<span class="growth-diff-positive">▲'+cStr(Math.abs(growth),mn)+'</span>':growth<0?'<span class="growth-diff-negative">▼'+cStr(Math.abs(growth),mn)+'</span>':'<span style="color:var(--text-sub)">―</span>';const cId=('chart_'+pl+'_'+mn).replace(/[^a-zA-Z0-9_]/g,'X');html+='<div class="player-growth-card"><div class="player-growth-header"><div class="player-growth-name">'+pl+'</div><div style="font-size:11px;color:var(--text-sub)">'+mn+'</div></div><div class="player-growth-stats"><div class="player-growth-stat"><span class="val">'+cStr(latestC,mn)+'</span><div class="lbl">最新</div></div><div class="player-growth-stat"><span class="val">'+cStr(maxC,mn)+'</span><div class="lbl">最高</div></div><div class="player-growth-stat"><span class="val">'+mnE.length+'回</span><div class="lbl">記録数</div></div><div class="player-growth-stat"><span class="val">'+growthStr+'</span><div class="lbl">成長</div></div></div><div class="chart-wrap"><canvas id="'+cId+'"></canvas></div></div>'})});html+='</div>'}c.innerHTML=html;setTimeout(()=>{allPlayers.forEach(pl=>{const plE=entries.filter(e=>e.player===pl);const menus=fm?[fm]:[...new Set(plE.map(e=>e.menu))];menus.forEach(mn=>{const mnE=plE.filter(e=>e.menu===mn).sort((a,b)=>a.date.localeCompare(b.date));if(!mnE.length)return;const cId=('chart_'+pl+'_'+mn).replace(/[^a-zA-Z0-9_]/g,'X');const canvas=document.getElementById(cId);if(!canvas||typeof Chart==='undefined')return;const ctx=canvas.getContext('2d');const ch=new Chart(ctx,{type:'line',data:{labels:mnE.map(e=>e.date.substring(5)),datasets:[{label:mn,data:mnE.map(e=>e.count),borderColor:'#6c63ff',backgroundColor:'rgba(108,99,255,0.12)',borderWidth:2,pointBackgroundColor:'#6c63ff',pointRadius:4,tension:0.3,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx2=>cStr(ctx2.raw,mn)}}},scales:{x:{ticks:{color:'#8888aa',font:{size:10}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#8888aa',font:{size:10},callback:v=>isRun(mn)?v+'秒':v+'回'},grid:{color:'rgba(255,255,255,0.05)'}}}}}); _charts[cId]=ch})})},50)}
function renderTags(){const pt=document.getElementById('player-tags'),mt=document.getElementById('menu-tags');if(pt)pt.innerHTML=state.players.map(p=>'<div class="tag">'+p+'<span class="rm" onclick="removePlayer(''+p.replace(/'/g,"\'")+'')">✕</span></div>').join('');if(mt)mt.innerHTML=state.menus.map(m=>'<div class="tag">'+m+'<span class="rm" onclick="removeMenu(''+m.replace(/'/g,"\'")+'')">✕</span></div>').join('')}
function addPlayer(){const el=document.getElementById('new-player');const n=el?.value.trim();if(!n)return;if(!state.players.includes(n)){state.players.push(n);save();renderAll()}el.value=''}
function removePlayer(p){state.players=state.players.filter(x=>x!==p);save();renderAll()}
function addMenu(){const el=document.getElementById('new-menu');const n=el?.value.trim();if(!n)return;if(!state.menus.includes(n)){state.menus.push(n);save();renderAll()}el.value=''}
function removeMenu(m){state.menus=state.menus.filter(x=>x!==m);save();renderAll()}
function clearAll(){if(!confirm('全データを削除しますか？'))return;state.entries=[];save();renderAll();showToast('削除しました')}
function renderAll(){renderPlayerList();refreshSelects();renderList();renderStats();renderTags()}
function openPera(){const m=document.getElementById('pera-modal');if(!m)return;m.classList.add('open');renderPera()}
function closePera(){const m=document.getElementById('pera-modal');if(m)m.classList.remove('open')}
function getPrevDE(date){const result=[];state.players.forEach(pl=>{state.menus.forEach(mn=>{const prevE=state.entries.filter(e=>e.player===pl&&e.menu===mn&&e.date<date&&!e.absent).sort((a,b)=>b.date.localeCompare(a.date));if(prevE.length)result.push(prevE[0])})});return result}
function renderPera(){
  const menu=document.getElementById('inp-menu')?.value||state.menus[0]||'',
    date=document.getElementById('inp-date')?.value||today(),
    allToday=state.entries.filter(e=>e.menu===menu&&e.date===date),
    entries=allToday.filter(e=>!e.absent),
    absentE=allToday.filter(e=>e.absent),
    prev=getPrevDE(date).filter(e=>e.menu===menu),
    r=isRun(menu);
  const pContent=document.getElementById('pera-content');
  if(!allToday.length){pContent.innerHTML='<div style="padding:40px;text-align:center;color:#999">この日の記録がありません</div>';return}
  const sorted=[...entries].sort((a,b)=>r?a.count-b.count:b.count-a.count),maxC=sorted[0]?.count||1,medals=['🥇','🥈','🥉'];
  let rankH=sorted.slice(0,5).map((p,i)=>{const pct=Math.round((r?maxC/p.count:p.count/maxC)*100);return '<div class="pera-rank-row"><div class="pera-rank-medal">'+(medals[i]||'　')+'</div><div class="pera-rank-name">'+p.player+'</div><div class="pera-rank-bar-wrap"><div class="pera-rank-bar-fill" style="width:'+pct+'%"></div></div><div class="pera-rank-val">'+cStr(p.count,menu)+'</div></div>'}).join('');
  const absentH=absentE.length?'<div style="margin-top:8px;padding:6px 10px;background:#fff8e1;border-radius:6px;font-size:12px;color:#888">⚠️ 欠席: '+absentE.map(e=>e.player).join('、')+'</div>':'';
  const maxMenu=Math.max(...sorted.map(e=>e.count),1);
  let cardsH=sorted.map(e=>{const pv=prev.find(pe=>pe.player===e.player);const d=pv?e.count-pv.count:null;const dStr=d!==null?(r?-d:d)>0?'<span class="pera-growth-diff up">▲'+cStr(Math.abs(d),menu)+'</span>':(r?-d:d)<0?'<span class="pera-growth-diff down">▼'+cStr(Math.abs(d),menu)+'</span>':'<span class="pera-growth-diff">―</span>':'<span class="pera-growth-diff">初</span>';const pct=Math.round(e.count/maxMenu*100);return '<div class="pera-player-card"><div class="pera-player-name">'+e.player+'</div><div class="pera-bar-row"><div class="pera-bar-label">'+menu.substring(0,5)+'</div><div class="pera-bar-track"><div class="pera-bar-fill" style="width:'+pct+'%;background:linear-gradient(90deg,#6c63ff,#4facfe)"></div></div><div class="pera-bar-val">'+cStr(e.count,menu)+'</div></div><div style="text-align:right;margin-top:4px">'+dStr+'</div></div>'}).join('');
  let growthH=sorted.map(e=>{const pv=prev.find(pe=>pe.player===e.player);if(!pv)return '';const pw=Math.round(pv.count/maxC*100),cw=Math.round(e.count/maxC*100),d=e.count-pv.count;const dStr=(r?-d:d)>0?'<span class="pera-growth-diff up">▲'+cStr(Math.abs(d),menu)+'</span>':(r?-d:d)<0?'<span class="pera-growth-diff down">▼'+cStr(Math.abs(d),menu)+'</span>':'<span class="pera-growth-diff">―</span>';return '<div class="pera-growth-row"><div class="pera-growth-name">'+e.player+'</div><div style="flex:1"><div class="pera-growth-bar-row"><div class="pera-growth-bar-label">前回</div><div class="pera-growth-bar-track"><div class="pera-growth-bar-prev" style="width:'+pw+'%"></div></div><div class="pera-growth-val" style="color:#999">'+cStr(pv.count,menu)+'</div></div><div class="pera-growth-bar-row"><div class="pera-growth-bar-label">今回</div><div class="pera-growth-bar-track"><div class="pera-growth-bar-curr" style="width:'+cw+'%"></div></div><div class="pera-growth-val">'+cStr(e.count,menu)+'</div></div></div>'+dStr+'</div>'}).filter(Boolean).join('');
  let historyH=state.players.map(pl=>{const mnE=state.entries.filter(e=>e.player===pl&&e.menu===menu&&!e.absent).sort((a,b)=>a.date.localeCompare(b.date));if(!mnE.length)return '';const latestC=mnE[mnE.length-1].count,firstC=mnE[0].count,maxCount=Math.max(...mnE.map(e=>e.count));const totalG=r?firstC-latestC:latestC-firstC;const dStr=totalG>0?'<span style="color:#4caf50;font-weight:700">▲'+cStr(Math.abs(totalG),menu)+'</span>':totalG<0?'<span style="color:#f44336;font-weight:700">▼'+cStr(Math.abs(totalG),menu)+'</span>':'―';const absCnt=state.entries.filter(e=>e.player===pl&&e.menu===menu&&e.absent).length;const barsH=mnE.slice(-6).map((e,i,arr)=>{const p2=i>0?arr[i-1].count:null;const d2=p2!==null?e.count-p2:null;const dS=d2!==null?(r?-d2:d2)>0?'<small style="color:#4caf50">▲'+cStr(Math.abs(d2),menu)+'</small>':(r?-d2:d2)<0?'<small style="color:#f44336">▼'+cStr(Math.abs(d2),menu)+'</small>':'<small>―</small>':'';const pct=Math.round(e.count/maxCount*100)||1;return '<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><div style="font-size:10px;color:#888;width:50px">'+e.date.substring(5)+'</div><div style="flex:1;height:6px;background:#e8e8e8;border-radius:3px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:linear-gradient(90deg,#6c63ff,#4facfe);border-radius:3px"></div></div><div style="font-size:11px;font-weight:700;min-width:50px;text-align:right">'+cStr(e.count,menu)+'</div>'+dS+'</div>'}).join('');return '<div class="pera-player-section"><div class="pera-player-header"><span>'+pl+'</span><span class="pera-player-best">最高: '+cStr(maxCount,menu)+' ｜ 成長: '+dStr+'</span></div><div class="pera-stats-row"><div class="pera-stat-item"><div class="pera-stat-num">'+cStr(latestC,menu)+'</div><div class="pera-stat-lbl">今回</div></div><div class="pera-stat-item"><div class="pera-stat-num">'+cStr(maxCount,menu)+'</div><div class="pera-stat-lbl">最高</div></div><div class="pera-stat-item"><div class="pera-stat-num">'+mnE.length+'回</div><div class="pera-stat-lbl">参加数</div></div><div class="pera-stat-item"><div class="pera-stat-num">'+absCnt+'回</div><div class="pera-stat-lbl">欠席</div></div></div>'+barsH+'</div>'}).filter(Boolean).join('');
  pContent.innerHTML='<div class="pera-title">⚡ VORTEX ハンドリング記録</div><div class="pera-sub"><span>'+date+' ／ '+menu+'</span><span>生成日時: '+new Date().toLocaleString('ja-JP')+'</span></div>'+(sorted.length?'<div class="pera-section-title">📊 本日のランキング</div>'+rankH+absentH:'')+(sorted.length?'<div class="pera-section-title">👤 選手別スコア</div><div class="pera-player-cards">'+cardsH+'</div>':'')+(growthH?'<div class="pera-section-title">📈 前回比較</div><div style="display:flex;gap:12px;font-size:10px;color:#888;margin-bottom:8px"><span><span class="legend-dot legend-prev"></span>前回</span><span><span class="legend-dot legend-curr"></span>今回</span></div>'+growthH:'')+(historyH?'<div class="pera-section-title">📉 選手別成長履歴 (直近6回)</div>'+historyH:'')
}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('inp-date').value=today();startSync()});
</script>
